name: Autonomous Investigator

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  investigate:
    name: Run Cold Case Investigation Cycle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run investigator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASE_URL: https://cold-case-ledger.replit.app
        run: node investigate.js
