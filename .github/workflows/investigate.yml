name: Autonomous Investigator

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  investigate:
    name: Run Cold Case Investigation Cycle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Verify secrets are present
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "ERROR: OPENAI_API_KEY secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "OPENAI_API_KEY present (length: ${#OPENAI_API_KEY})"

      - name: Run investigator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASE_URL: https://cold-case-ledger.replit.app
        run: node investigate.js
